name: Test Automation Workflow

on: 
   schedule:
      - cron: '30 18 * * *'
   push:
      branches:
         - master
   pull_request:
      branches:
         - master

jobs:
   build:
      runs-on: ubuntu-latest

      steps:
         - name: Checkout code
           uses: actions/checkout@v6.0.2

         - name: set up JDK 11
           uses: actions/setup-java@v5.2.0
           with:
             java-version: '11'
             distribution: 'temurin'
             cache: maven
             
         - name: Running Test Automation Framework with Maven
           run: mvn test -X -Dbrowser=chrome -DisLambdaTest=true -DisHeadless=false

         - name: Upload Test Logs
           if: always()
           uses: actions/upload-artifact@v7.0.1
           with:
             name: Test Logs
             path: logs/
             
         - name: Upload Screenshots as Artifacts
           if: always()
           uses: actions/upload-artifact@v7.0.1
           with:
             name: screenshots
             path: screenshots/

         - name: Upload HTML Test Reports as Artifacts
           if: always()
           uses: actions/upload-artifact@v7.0.1
           with:
             name: htlm-report
             path: report.html

         - name: Test Execution Status
           run: echo "Test Execution Completed"

         - name: Copy Report to gh-pages Folder
           if: always()
           
           run: |
             mkdir -p public/extent-reports
             cp -R report.html public/extent-reports
             cp -R screenshots/ public/extent-reports/screenshots
             ls -l
           

         - name: Deploy
           if: always()
           uses: JamesIves/github-pages-deploy-action@v4.8.0
           with:
             folder: public/extent-reports/
             token: ${{ secrets.PAT1234 }}
             clean: true
        
